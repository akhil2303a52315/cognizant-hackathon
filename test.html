<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SupplyChainGPT Council - Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; }
        .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 40px; border-bottom: 1px solid #2a2a4a; }
        .header h1 { font-size: 24px; background: linear-gradient(90deg, #3b82f6, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: #888; font-size: 13px; margin-top: 4px; }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .input-section { display: flex; gap: 10px; margin-bottom: 30px; }
        .input-section input { flex: 1; padding: 14px 18px; border-radius: 10px; border: 1px solid #2a2a4a; background: #1a1a2e; color: #fff; font-size: 15px; outline: none; }
        .input-section input:focus { border-color: #3b82f6; }
        .input-section button { padding: 14px 28px; border-radius: 10px; border: none; background: linear-gradient(135deg, #3b82f6, #8b5cf6); color: #fff; font-size: 15px; font-weight: 600; cursor: pointer; white-space: nowrap; }
        .input-section button:hover { opacity: 0.9; }
        .input-section button:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 10px 16px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; display: none; }
        .status.loading { display: block; background: #1a1a2e; border: 1px solid #3b82f6; color: #3b82f6; }
        .status.error { display: block; background: #2a1a1a; border: 1px solid #ef4444; color: #ef4444; }
        .status.success { display: block; background: #1a2a1a; border: 1px solid #22c55e; color: #22c55e; }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 16px; margin-bottom: 24px; }
        .agent-card { background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 12px; padding: 20px; }
        .agent-card h3 { font-size: 15px; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .agent-card .icon { width: 20px; height: 20px; }
        .agent-card .provider { font-size: 11px; color: #888; margin-bottom: 10px; }
        .agent-card .contribution { font-size: 13px; line-height: 1.6; color: #ccc; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
        .agent-card.risk { border-left: 3px solid #ef4444; }
        .agent-card.supply { border-left: 3px solid #22c55e; }
        .agent-card.logistics { border-left: 3px solid #3b82f6; }
        .agent-card.market { border-left: 3px solid #f59e0b; }
        .agent-card.finance { border-left: 3px solid #10b981; }
        .agent-card.brand { border-left: 3px solid #8b5cf6; }
        .synthesis { background: #1a1a2e; border: 1px solid #3b82f6; border-radius: 12px; padding: 24px; margin-bottom: 24px; }
        .synthesis h2 { font-size: 18px; color: #3b82f6; margin-bottom: 12px; }
        .synthesis .content { font-size: 14px; line-height: 1.7; color: #ccc; white-space: pre-wrap; }
        .meta { display: flex; gap: 20px; margin-top: 12px; font-size: 12px; color: #888; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="header">
        <h1>SupplyChainGPT Council of Debate</h1>
        <p>Multi-Agent AI Framework for Supply Chain Risk & Optimization</p>
    </div>
    <div class="container">
        <div class="input-section">
            <input type="text" id="query" placeholder="Enter a supply chain query... e.g. 'Taiwan semiconductor factory fire impact'" />
            <button id="btn" onclick="analyze()">Analyze</button>
        </div>
        <div id="status" class="status"></div>
        <div id="results" class="hidden">
            <div id="agents" class="agents-grid"></div>
            <div id="synthesis" class="synthesis">
                <h2>Council Synthesis</h2>
                <div id="synthesis-content" class="content"></div>
                <div id="meta" class="meta"></div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';
        const API_KEY = 'dev-key';

        const AGENT_COLORS = {
            risk: '#ef4444', supply: '#22c55e', logistics: '#3b82f6',
            market: '#f59e0b', finance: '#10b981', brand: '#8b5cf6'
        };
        const AGENT_ICONS = {
            risk: '\u{1F6E1}\uFE0F', supply: '\u{1F3ED}', logistics: '\u{1F6A2}',
            market: '\u{1F4C8}', finance: '\u{1F4B0}', brand: '\u{1F3F7}\uFE0F'
        };

        async function analyze() {
            const query = document.getElementById('query').value.trim();
            if (!query) return;

            const btn = document.getElementById('btn');
            const status = document.getElementById('status');
            const results = document.getElementById('results');

            btn.disabled = true;
            btn.textContent = 'Running Council...';
            status.className = 'status loading';
            status.textContent = 'Council is debating... 7 agents analyzing your query';
            results.classList.add('hidden');

            try {
                const res = await fetch(`${API_BASE}/council/analyze?api_key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!res.ok) {
                    const err = await res.text();
                    throw new Error(err);
                }

                const data = await res.json();
                status.className = 'status success';
                status.textContent = `Council complete in ${data.latency_ms}ms \u2014 Round ${data.round_number}`;
                renderResults(data);
            } catch (e) {
                status.className = 'status error';
                status.textContent = 'Error: ' + e.message;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Analyze';
            }
        }

        function renderResults(data) {
            const agentsDiv = document.getElementById('agents');
            const synthDiv = document.getElementById('synthesis-content');
            const metaDiv = document.getElementById('meta');
            const results = document.getElementById('results');

            agentsDiv.innerHTML = '';
            (data.agent_outputs || []).forEach(a => {
                const card = document.createElement('div');
                card.className = `agent-card ${a.agent}`;
                card.innerHTML = `
                    <h3><span>${AGENT_ICONS[a.agent] || '🤖'}</span> ${a.agent.charAt(0).toUpperCase() + a.agent.slice(1)} Agent</h3>
                    <div class="provider">Model: ${a.model_used} | Provider: ${a.provider}</div>
                    <div class="contribution">${escapeHtml(a.contribution)}</div>
                `;
                agentsDiv.appendChild(card);
            });

            synthDiv.textContent = data.recommendation || 'No synthesis available';
            metaDiv.innerHTML = `
                <span>Session: ${data.session_id?.slice(0,8)}...</span>
                <span>Confidence: ${data.confidence}%</span>
                <span>Latency: ${data.latency_ms}ms</span>
                <span>Status: ${data.status}</span>
            `;
            results.classList.remove('hidden');
        }

        function escapeHtml(text) {
            const d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        document.getElementById('query').addEventListener('keydown', e => {
            if (e.key === 'Enter') analyze();
        });
    </script>
</body>
</html>
