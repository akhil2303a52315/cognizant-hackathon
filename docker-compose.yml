services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  neo4j:
    image: neo4j:5-community
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/testpassword
    volumes:
      - neo4j_data:/data

  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma

  # Firecrawl self-hosted — run from firecrawl/ directory instead:
  #   cd firecrawl && docker compose up -d
  # This provides unlimited web scraping at http://localhost:3002
  # Set FIRECRAWL_BASE_URL=http://localhost:3002 in .env

volumes:
  redis_data:
  neo4j_data:
  chroma_data:
